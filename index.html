<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個案安置轉介平台｜醫療端起案</title>
  <style>
    :root{
      --primary:#0f766e;
      --primary-dark:#115e59;
      --bg:#f0fdfa;
      --card:#ffffff;
      --border:#cbd5e1;
      --text:#0f172a;
      --muted:#475569;
      --danger:#dc2626;
      --success:#16a34a;
      --shadow:0 10px 30px rgba(15, 23, 42, 0.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
      background:linear-gradient(180deg,#ecfeff 0%, #f8fafc 100%);
      color:var(--text);
    }

    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:24px 16px 60px;
    }

    .hero{
      background:linear-gradient(135deg,#0f766e 0%, #14b8a6 100%);
      color:#fff;
      border-radius:24px;
      padding:28px 24px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:28px;
      line-height:1.3;
    }

    .hero p{
      margin:0;
      color:rgba(255,255,255,0.92);
      font-size:15px;
      line-height:1.7;
    }

    .card{
      background:var(--card);
      border:1px solid #e2e8f0;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    .section-title{
      font-size:20px;
      font-weight:700;
      margin:0 0 18px;
    }

    .sub-title{
      font-size:15px;
      font-weight:700;
      margin:0 0 14px;
      color:var(--primary-dark);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:16px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:14px;
      font-weight:700;
      color:#1e293b;
    }

    .required{
      color:var(--danger);
      margin-left:4px;
    }

    input[type="text"],
    input[type="number"],
    input[type="datetime-local"],
    select,
    textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:13px 14px;
      font-size:15px;
      outline:none;
      background:#fff;
      transition:all .2s ease;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(20,184,166,0.12);
    }

    .check-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .check-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
    }

    .check-item input{
      width:18px;
      height:18px;
      accent-color:var(--primary);
      flex-shrink:0;
    }

    .helper{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:24px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:all .2s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-dark);
      transform:translateY(-1px);
    }

    .btn-secondary{
      background:#e2e8f0;
      color:#0f172a;
    }

    .btn-secondary:hover{
      background:#cbd5e1;
    }

    .preview-box{
      background:#f8fafc;
      border:1px dashed #94a3b8;
      border-radius:16px;
      padding:16px;
      line-height:1.8;
      font-size:14px;
      color:#334155;
      white-space:pre-wrap;
      min-height:180px;
    }

    .status{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:14px;
      display:none;
      line-height:1.7;
    }

    .status.success{
      display:block;
      background:#f0fdf4;
      border:1px solid #bbf7d0;
      color:#166534;
    }

    .status.error{
      display:block;
      background:#fef2f2;
      border:1px solid #fecaca;
      color:#991b1b;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#ccfbf1;
      color:#115e59;
      margin-bottom:10px;
    }

    @media (max-width: 768px){
      .grid,
      .grid-3,
      .check-grid{
        grid-template-columns:1fr;
      }

      .hero h1{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 40px;
      }

      .card{
        padding:18px;
      }
    }
    .modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:999;
}

.modal-content{
  background:#fff;
  width:95%;
  max-width:900px;
  margin:40px auto;
  border-radius:18px;
  padding:20px;
  max-height:80vh;
  overflow:auto;
}

.service-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #eee;
}

.counter{
  display:none;
}

/* ===== 機構選擇 Modal ===== */
.fac-modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.fac-modal-overlay.show{display:flex;}
.fac-modal{background:#fff;border-radius:20px;width:100%;max-width:680px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(15,23,42,0.2);overflow:hidden;}
.fac-modal-head{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#0f766e,#14b8a6);flex-shrink:0;}
.fac-modal-head h3{margin:0;font-size:17px;font-weight:900;color:#fff;}
.fac-modal-close{border:none;background:rgba(255,255,255,0.25);border-radius:10px;width:32px;height:32px;font-size:18px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;}
.fac-search-bar{padding:14px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0;}
.fac-search-input{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:10px 14px;font-size:15px;outline:none;transition:border-color .2s;}
.fac-search-input:focus{border-color:#0f766e;box-shadow:0 0 0 4px rgba(20,184,166,0.12);}
.fac-stats-bar{padding:8px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0;background:#f8fafc;border-bottom:1px solid #f1f5f9;}
.fac-stat-chip{font-size:12px;font-weight:700;color:#475569;}
.fac-action-btns{display:flex;gap:8px;margin-left:auto;}
.fac-action-btn{border:1px solid #d1d5db;background:#fff;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;color:#374151;}
.fac-action-btn:hover{background:#f3f4f6;}
.fac-list-wrap{overflow-y:auto;flex:1;padding:8px 0;}
.fac-area-title{padding:8px 16px 4px;font-size:11px;font-weight:900;color:#94a3b8;text-transform:uppercase;position:sticky;top:0;background:#fff;z-index:1;}
.fac-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid #f8fafc;}
.fac-item:hover{background:#f0fdf9;}
.fac-item.selected{background:#ecfdf5;}
.fac-item-check{width:20px;height:20px;border-radius:6px;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:13px;color:transparent;}
.fac-item.selected .fac-item-check{background:#0f766e;border-color:#0f766e;color:#fff;}
.fac-item-info{flex:1;min-width:0;}
.fac-item-name{font-size:14px;font-weight:700;color:#0f172a;}
.fac-item-sub{font-size:12px;color:#94a3b8;margin-top:2px;}
.fac-no-result{text-align:center;padding:32px;color:#94a3b8;font-size:14px;}
.fac-modal-foot{padding:14px 20px;border-top:1px solid #e5e7eb;flex-shrink:0;display:flex;gap:10px;justify-content:flex-end;align-items:center;}
.fac-selected-count{font-size:13px;color:#0f766e;font-weight:700;margin-right:auto;}
.fac-tags-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;min-height:20px;}
.fac-tag{display:inline-flex;align-items:center;gap:6px;background:#ccfbf1;color:#115e59;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;}
.fac-tag-del{cursor:pointer;font-size:14px;color:#0f766e;background:none;border:none;padding:0;}
.fac-trigger-btn{display:flex;align-items:center;justify-content:space-between;width:100%;border:2px dashed #a7f3d0;background:#f0fdf9;border-radius:14px;padding:14px 16px;cursor:pointer;font-size:15px;font-weight:700;color:#0f766e;transition:all .2s;}
.fac-trigger-btn:hover{background:#ecfdf5;border-color:#0f766e;}
.fac-trigger-badge{background:#0f766e;color:#fff;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:900;min-width:24px;text-align:center;}
/* ===== 群組功能 ===== */
/* 群組快選列 */
.grp-bar{padding:10px 16px;border-bottom:1px solid #e5e7eb;flex-shrink:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#f8fafc;}
.grp-bar-label{font-size:12px;font-weight:700;color:#64748b;white-space:nowrap;}
.grp-chip{display:inline-flex;align-items:center;gap:5px;border:1.5px solid #a7f3d0;background:#ecfdf5;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;color:#065f46;cursor:pointer;transition:all .15s;white-space:nowrap;}
.grp-chip:hover{background:#d1fae5;border-color:#0f766e;}
.grp-chip.flash{background:#0f766e;color:#fff;border-color:#0f766e;}
.grp-chip-count{background:rgba(0,0,0,0.12);border-radius:999px;padding:1px 7px;font-size:11px;}
.grp-chip-add{border:1.5px dashed #a7f3d0;background:#fff;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;color:#0f766e;cursor:pointer;white-space:nowrap;}
.grp-chip-add:hover{background:#ecfdf5;}
.grp-manage-btn{margin-left:auto;font-size:12px;font-weight:700;color:#0f766e;background:none;border:1px solid #a7f3d0;border-radius:8px;padding:4px 10px;cursor:pointer;white-space:nowrap;}
.grp-manage-btn:hover{background:#ecfdf5;}
.grp-empty-bar{font-size:12px;color:#94a3b8;padding:2px 0;}
/* 群組編輯 Sub-Modal */
.grp-edit-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:1100;align-items:center;justify-content:center;padding:16px;}
.grp-edit-overlay.show{display:flex;}
.grp-edit-modal{background:#fff;border-radius:20px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(15,23,42,0.25);overflow:hidden;}
.grp-edit-head{padding:16px 20px;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.grp-edit-head h3{margin:0;font-size:16px;font-weight:900;color:#fff;}
.grp-edit-close{border:none;background:rgba(255,255,255,0.25);border-radius:8px;width:30px;height:30px;font-size:18px;cursor:pointer;color:#fff;}
.grp-edit-body{padding:14px 16px;overflow-y:auto;flex:1;}
.grp-name-field{margin-bottom:14px;}
.grp-name-label{font-size:13px;font-weight:700;color:#374151;margin-bottom:6px;display:block;}
.grp-name-input{width:100%;border:1.5px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:15px;outline:none;box-sizing:border-box;}
.grp-name-input:focus{border-color:#3b82f6;}
.grp-fac-search{margin-bottom:10px;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px;width:100%;outline:none;box-sizing:border-box;}
.grp-fac-list{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:10px;padding:6px;}
.grp-fac-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;}
.grp-fac-item:hover{background:#f0fdf9;}
.grp-fac-item.checked{background:#ecfdf5;}
.grp-fac-item input[type=checkbox]{width:16px;height:16px;accent-color:#0f766e;cursor:pointer;}
.grp-fac-item-name{font-size:13px;font-weight:600;color:#0f172a;}
.grp-edit-foot{padding:12px 16px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
<div class="wrap">

  <!-- =========================
       HERO
  ========================= -->
  <div class="hero">
    <div class="pill">醫療端起案</div>
    <h1>個案安置轉介平台</h1>
    <p>
      此頁提供醫療端建立安置轉介案件。送出後可串接 n8n / LINE Bot / 資料庫，
      自動通知安置中心群組或各機構。
    </p>
  </div>
<!-- =========================
     立案基本資料（卡片1）
========================= -->
<div class="card">
  <div class="section-title">立案基本資料</div>
  <div class="grid">

    <!-- 第一列 -->
    <div class="field">
      <label>案件編號</label>
      <input type="text" id="caseId" readonly />
    </div>

    <div class="field">
      <label>起案時間</label>
      <input type="datetime-local" id="referralTime" />
    </div>

    <!-- 第二列 -->
    <div class="field">
      <label>個管師姓名<span class="required">*</span></label>
      <div style="display:flex;gap:8px;">
        <input type="text" id="caseManager" style="flex:1;" />
        <select id="caseManagerSelect" class="btn-secondary" style="width:160px; padding: 6px;" onchange="fillManagerInfo()"><option value="">快速帶入名單...</option></select>
      </div>
    </div>

    <div class="field">
      <label>聯絡電話<span class="required">*</span></label>
      <input type="text" id="caseManagerPhone" />
    </div>

    <!-- 第三列 -->
    <div class="field">
      <label>轉介單位<span class="required">*</span></label>
      <input type="text" id="hospital" />
    </div>

    <div class="field">
      <label>單位分機</label>
      <input type="text" id="hospitalExt" />
    </div>

  </div>
</div>

<!-- =========================
     個案基本資料 + 功能評估（卡片2）
========================= -->
<div class="card">
  <div class="section-title">個案基本資料與功能評估</div>

  <!-- 個案基本資訊 -->
  <div class="sub-title">個案基本資訊</div>
  <div class="grid">

    <div class="field">
      <label>個案姓名</label>
      <input type="text" id="patientName" />
    </div>

    <div class="field">
      <label>性別<span class="required">*</span></label>
      <select id="gender">
        <option value="">請選擇</option>
        <option value="男">男</option>
        <option value="女">女</option>
        <option value="其他">其他</option>
      </select>
    </div>

    <div class="field">
      <label>年齡<span class="required">*</span></label>
      <input type="number" id="age" />
    </div>

    <div class="field">
      <label>身高(cm)</label>
      <input type="number" id="height" />
    </div>

    <div class="field">
      <label>體重(kg)</label>
      <input type="number" id="weight" />
    </div>

    <div class="field full">
      <label>地址</label>
      <input type="text" id="address" />
    </div>

  </div>

  <!-- 功能評估 -->
  <div class="sub-title">功能評估</div>
  <div class="grid-3">

    <div class="field">
      <label>CMS 失能等級</label>
      <select id="cmsLevel">
        <option value="">請選擇</option>
        <option value="2">2級</option>
        <option value="3">3級</option>
        <option value="4">4級</option>
        <option value="5">5級</option>
        <option value="6">6級</option>
        <option value="7">7級</option>
        <option value="8">8級</option>
      </select>
    </div>

    <div class="field">
      <label>行動能力</label>
      <select id="mobility">
        <option value="">請選擇</option>
        <option value="可自行行走">可自行行走</option>
        <option value="可使用輔具行走(手杖、助行器等)">可使用輔具行走(手杖、助行器等)</option>
        <option value="使用輔具並扶持下行走">使用輔具並扶持下行走</option>
        <option value="無法行走，但可站立">無法行走，但可站立</option>
        <option value="無法行走及站立，需全移位">無法行走及站立，需全移位</option>
        <option value="長期臥床，均於床上照顧">長期臥床，均於床上照顧</option>
      </select>
    </div>

    <div class="field">
      <label>意識</label>
      <select id="consciousness">
        <option value="">請選擇</option>
        <option value="清楚">清楚</option>
        <option value="混亂">混亂</option>
        <option value="木僵">木僵</option>
      </select>
    </div>

  </div>
</div>
  
  <!-- =========================
       長照轉介資訊（獨立一張卡）
  ========================= -->
 
<div class="card">
  <div class="section-title">服務項目與照護內容</div>

  <!-- =========================
       ③ 服務需求
  ========================= -->
  <div class="sub-title">服務需求</div>
  <div class="grid">

    <div class="field">
      <label>服務類型</label>
      <select id="serviceType">
        <option value="">請選擇</option>
        <option value="居家服務">居家服務</option>
        <option value="居家喘息服務">居家喘息服務</option>
      </select>
    </div>

    <div class="field">
      <label>服務時段</label>
      <input type="text" id="serviceTime" />
    </div>

  </div>
<div class="sub-title">服務碼別</div>

<div class="field">
  <button type="button" class="btn-secondary" onclick="openServiceModal()">
    選擇服務碼（含次數）
  </button>

  <div id="selectedServices" class="helper">
    尚未選擇
  </div>
</div>

  <div class="field">
    <label>案況簡述（長照）</label>
    <textarea id="caseSummary"></textarea>
  </div>

  <div class="field">
    <label>特殊需求（長照）</label>
    <div class="check-grid" style="margin-top:8px;">
      <label class="check-item"><input type="checkbox" class="special-need-check" value="需女性居服員"> 需女性居服員</label>
      <label class="check-item"><input type="checkbox" class="special-need-check" value="需男性居服員"> 需男性居服員</label>
    </div>
    <textarea id="specialNeedOther" placeholder="其他需求..." style="margin-top:10px;"></textarea>
  </div>



  </div>



</div>
  <!-- =========================
       送出案件
  ========================= -->
  <div class="card">
    <div class="section-title">派案設定與送出</div>

    <!-- 派案模式 -->
    <div class="field" style="margin-bottom:20px;">
      <label style="font-size:14px; font-weight:700; color:#1e293b; margin-bottom:10px; display:block;">派案模式</label>
      <div class="check-grid">
        <label class="check-item">
          <input type="radio" name="targetGroup" value="指定機構" onchange="handleModeChange()" checked>
          <span>🎯 指定機構</span>
        </label>
        <label class="check-item">
          <input type="radio" name="targetGroup" value="合作機構(一輪)" onchange="handleModeChange()">
          <span>🔵 合作機構（一輪）</span>
        </label>
        <label class="check-item">
          <input type="radio" name="targetGroup" value="全區機構(二輪)" onchange="handleModeChange()">
          <span>🟡 全區機構（二輪）</span>
        </label>
        <label class="check-item">
          <input type="radio" name="targetGroup" value="困難派案(三輪)" onchange="handleModeChange()">
          <span>🔴 困難派案（三輪）</span>
        </label>
      </div>
    </div>

const N8N_WEBHOOKS = {

/** 通用 Webhook 發送（靜默失敗，不阻斷主流程） */
function notifyN8N(url, payload) {
  if (!url || !url.startsWith('http')) return;
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(e => console.warn('[N8N Webhook Error]', e));
}

const $ = (id) => document.getElementById(id);

function getTaiwanDateTimeLocal() {
  const now = new Date();
  const taiwanTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
  return taiwanTime.toISOString().slice(0, 16);
}

function generateCaseId() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const rand = Math.random().toString(36).substring(2, 6).toUpperCase();
  return `REF-${y}${m}${d}-${rand}`;
}

  };
}

function validateForm(data) {
  if (!data.hospital) return "請填寫轉介單位";
  if (!data.case_manager) return "請填寫個管師姓名";
  if (!data.case_manager_phone) return "請填寫聯絡電話";
  if (!data.gender) return "請選擇性別";
  if (!data.age) return "請填寫年齡";
  return "";
}

    function updatePreview() {
      // 預覽功能已移除，保留空函式避免其他綁定的事件報錯
    }

    /* =========================
       狀態顯示
    ========================= */
    function showStatus(type, message) {
      const box = $("statusBox");
      box.className = `status ${type}`;
      box.textContent = message;
    }

    /* =========================
       送出案件
    ========================= */
    async function submitForm() {
      const data = getFormData();
      const error = validateForm(data);

      if (error) {
        showStatus("error", error);
        return;
      }

      // 映射到 Supabase 資料表欄位
      const caseData = {
        case_id: data.case_id,
        patient_name: data.patient_name,
        hospital: data.hospital,
        age: parseInt(data.age) || 0,
        gender: data.gender,
        diagnosis: data.case_summary, // 暫時對應到診斷
        case_summary: data.case_summary,
        mobility: data.mobility,
        consciousness: data.consciousness,
        oxygen: "無", // 預設
        status: "一輪媒合中",
        created_at: new Date().toISOString(),
        contact_name: data.patient_name, // 簡化處理
        contact_phone: data.case_manager_phone,
        address: data.address,
        cms_level: data.cms_level,
        service_type: "長照服務",
        service_time: data.service_time,
        service_codes: data.service_codes,
        special_need: data.special_needs.join('、') + (data.special_need_other ? ` (${data.special_need_other})` : ""),
        case_manager: data.case_manager,
        total_targets: getSelectedFacilities().length,
        target_group: data.target_group
      };

      try {
        showStatus("success", "儲存至資料庫中...");

        const { error: sbError } = await window.supabaseClient
          .from('cases')
          .insert([caseData]);

        if (sbError) throw sbError;

        showStatus(
          "success",
          `案件已成功建立！\n案件編號：${data.case_id}\n資料已存入 Supabase 並自動啟動媒合程序。`
        );

        // 🔔 N8N：新案件建立通知
        notifyN8N(N8N_WEBHOOKS.createCase, { event: 'case_created', ...caseData });

        setTimeout(() => {
          if (confirm("建立成功！是否重新整理頁面？")) location.reload();
        }, 1500);

      } catch (err) {
        console.error("Supabase Error:", err);
        showStatus(
          "error",
          `儲存至 Supabase 失敗。\n請確認 SQL Table 已建立且 RLS 已開啟。\n錯誤：${err.message}`
        );
      }
    }

    function handleModeChange() {
      var wrap = document.getElementById('facilityPickerWrap');

    function initDefaultGroups() {
      loadGroups();
      const hasRound1 = facGroups.some(g => g.name === '合作機構(一輪)');
      if (!hasRound1 && allFacilities.length > 0) {
        const round1Ids = allFacilities.filter(f => f.is_round_1).map(f => String(f.id));
        if (round1Ids.length > 0) {

          });

    /* ===== 機構選擇器 ===== */
    var allFacilities = [];
    var selectedFacIds = new Set();
    var pendingFacIds  = new Set();

    async function loadFacilities() {
      try {
        if (window.supabaseClient) {
          var res = await window.supabaseClient.from('facilities').select('*').order('service_area');
          if (!res.error && res.data && res.data.length > 0) {
            allFacilities = res.data.map(function(f) {
              return { 
                id: f.id || f.facility_name, 
                name: f.facility_name || '', 
                short: f.short_name || '', 
                area: f.service_area || '其他', 
                phone: f.phone || '',
                is_round_1: f.is_round_1 || false,
                is_full_survey: f.is_full_survey || false
              };
            });
            var el = document.getElementById('facStatTotal');
            if (el) el.textContent = '共 ' + allFacilities.length + ' 間';
            initDefaultGroups();
            return;
          }
        }
        var resp = await fetch('facilities.json');
        if (resp.ok) {
          var json = await resp.json();
          var arr = Array.isArray(json) ? json : (json.facilities || []);
          allFacilities = arr.map(function(f, i) {
            return { id: f.id || f.facility_name || i, name: f.facility_name || f.name || '', short: f.short_name || '', area: f.service_area || f.area || '其他', phone: f.phone || '' };
          });
          var el = document.getElementById('facStatTotal');
          if (el) el.textContent = '共 ' + allFacilities.length + ' 間';
        }
      } catch(e) { console.warn('loadFacilities:', e); }
    }

    function openFacModal() {
      pendingFacIds = new Set(selectedFacIds);
      renderGrpBar();
      renderFacList();
      document.getElementById('facModalOverlay').classList.add('show');
      setTimeout(function() { var inp = document.getElementById('facSearchInput'); if (inp) inp.focus(); }, 80);
    }
    window._openFacModal = openFacModal;
    function closeFacModal() {
      document.getElementById('facModalOverlay').classList.remove('show');
      var inp = document.getElementById('facSearchInput'); if (inp) inp.value = '';
    }
    window._closeFacModal = closeFacModal;
    function confirmFacModal() {
      selectedFacIds = new Set(pendingFacIds);
      renderFacTags();
      closeFacModal();
    }
    window._confirmFacModal = confirmFacModal;

    function renderFacList() {
      var inp = document.getElementById('facSearchInput');
      var q = inp ? inp.value.trim().toLowerCase() : '';
      var filtered = allFacilities.filter(function(f) {
        return !q || f.name.toLowerCase().indexOf(q) >= 0 || f.short.toLowerCase().indexOf(q) >= 0 || f.area.toLowerCase().indexOf(q) >= 0;
      });
      var statEl = document.getElementById('facStatFiltered');
      if (statEl) statEl.textContent = q ? ('篩選結果 ' + filtered.length + ' 間') : '';
      var grouped = {};
      filtered.forEach(function(f) { if (!grouped[f.area]) grouped[f.area] = []; grouped[f.area].push(f); });
      var wrap = document.getElementById('facListWrap');
      if (!filtered.length) { wrap.innerHTML = '<div class="fac-no-result">😶 找不到符合的機構</div>'; updateFacCount(); return; }
      var listHtml = '';
      Object.keys(grouped).forEach(function(area) {
        listHtml += '<div class="fac-area-title">' + area + '</div>';
        grouped[area].forEach(function(f) {
          var sid = String(f.id);
          var sel = pendingFacIds.has(f.id) || pendingFacIds.has(sid);
          var safeId = sid.replace(/[^a-zA-Z0-9]/g, '_');
          var shortHtml = (f.short && f.short !== f.name) ? ' <span style="font-weight:400;color:#94a3b8;font-size:12px;">' + f.short + '</span>' : '';
          var phoneHtml = f.phone ? '<div class="fac-item-sub">📞 ' + f.phone + '</div>' : '';
          listHtml += '<div class="fac-item' + (sel ? ' selected' : '') + '" onclick="toggleFac(\'' + safeId + '\')">'
            + '<div class="fac-item-check">' + (sel ? '✓' : '') + '</div>'
            + '<div class="fac-item-info"><div class="fac-item-name">' + f.name + shortHtml + '</div>' + phoneHtml + '</div>'
            + '</div>';
        });
      });
      wrap.innerHTML = listHtml;
      updateFacCount();
    }

    window._renderFacList = renderFacList;

    /* ===== 群組管理邏輯 ===== */
    var GRP_KEY = 'refcare_fac_groups';
    var facGroups = [];
    var editingGrpId = null;

    function loadGroups() {
      try { facGroups = JSON.parse(localStorage.getItem(GRP_KEY) || '[]'); } catch(e) { facGroups = []; }
    }
    function saveGroups() { localStorage.setItem(GRP_KEY, JSON.stringify(facGroups)); }
    function genId() { return 'g' + Date.now() + Math.floor(Math.random()*1000); }
    loadGroups();

    /* 渲染群組快選列（Modal 頂部 chips） */
    function renderGrpBar() {
      loadGroups();
      var bar    = document.getElementById('grpBar');
      var emptyEl = document.getElementById('grpBarEmpty');
      if (!bar) return;
      // 移除舊 chip
      bar.querySelectorAll('.grp-chip').forEach(function(el){ el.remove(); });
      if (emptyEl) emptyEl.style.display = facGroups.length ? 'none' : 'inline';
      var addBtn = bar.querySelector('.grp-chip-add');
      facGroups.forEach(function(g) {
        var chip = document.createElement('button');
        chip.className = 'grp-chip';
        chip.title = '點擊選入所有成員';
        chip.innerHTML = g.name + '<span class="grp-chip-count">' + g.facilityIds.length + '間</span>';
        chip.onclick = function(){ selectGroup(g.id, chip); };
        bar.insertBefore(chip, addBtn);
      });
    }

    /* 點擊 chip 選入群組 */
    function selectGroup(gid, chipEl) {
      loadGroups();
      var g = facGroups.find(function(x){ return x.id === gid; });
      if (!g) return;
      g.facilityIds.forEach(function(fid){ pendingFacIds.add(fid); });
      updateFacCount();
      renderFacList();
      if (chipEl) {
        chipEl.classList.add('flash');
        setTimeout(function(){ chipEl.classList.remove('flash'); }, 800);
      }
    }
    window._selectGroup = selectGroup;

    /* 新增群組（快速） */
    function openGrpAdd() {
      editingGrpId = null;
      var nameEl = document.getElementById('grpEditName');
      if (nameEl) nameEl.value = '';
      renderGrpFacList();
      var ov = document.getElementById('grpEditOverlay');
      if (ov) ov.classList.add('show');
    }
    window._addGroup = openGrpAdd;

    /* 管理群組 → 開啟管理 Modal */
    function openGrpManage() {
      editingGrpId = null;
      renderGrpManageList();
      var ov = document.getElementById('grpManageOverlay');
      if (ov) ov.classList.add('show');
    }
    window._openGrpManage = openGrpManage;

    function closeGrpManage() {
      var ov = document.getElementById('grpManageOverlay');
      if (ov) ov.classList.remove('show');
    }
    window._closeGrpManage = closeGrpManage;

    function renderGrpManageList() {
      loadGroups();
      var wrap = document.getElementById('grpManageList');
      if (!wrap) return;
      if (!facGroups.length) {
        wrap.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:14px;">尚無群組，請點右上角「＋ 新增」</div>';
        return;
      }
      wrap.innerHTML = facGroups.map(function(g) {
        var cnt = g.facilityIds.length;
        var members = allFacilities.filter(function(f){ return g.facilityIds.indexOf(String(f.id)) >= 0 || g.facilityIds.indexOf(f.id) >= 0; });
        var preview = members.slice(0, 5).map(function(f){ return f.short || f.name; }).join('、') + (members.length > 5 ? '...' : '');
        return '<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #f1f5f9;">'
          + '<div style="flex:1;min-width:0;">'
          + '<div style="font-size:14px;font-weight:800;color:#0f172a;">' + g.name + ' <span style="font-size:12px;font-weight:400;color:#0f766e;">(' + cnt + '間)</span></div>'
          + '<div style="font-size:12px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + (preview || '尚未設定成員') + '</div>'
          + '</div>'
          + '<button onclick="editGroup(\'' + g.id + '\')" style="font-size:12px;font-weight:700;border:1px solid #e2e8f0;background:#f8fafc;border-radius:8px;padding:5px 10px;cursor:pointer;">✏️ 編輯</button>'
          + '<button onclick="deleteGroup(\'' + g.id + '\')" style="font-size:12px;font-weight:700;border:1px solid #fecaca;background:#fee2e2;color:#dc2626;border-radius:8px;padding:5px 10px;cursor:pointer;">🗑</button>'
          + '</div>';
      }).join('');
    }

    /* 編輯群組 */
    function editGroup(gid) {
      loadGroups();
      editingGrpId = gid;
      var g = facGroups.find(function(x){ return x.id === gid; });
      var titleEl = document.getElementById('grpEditTitle');
      var nameEl  = document.getElementById('grpEditName');
      if (titleEl) titleEl.textContent = '✏️ 編輯群組';
      if (nameEl && g) nameEl.value = g.name;
      renderGrpFacList();
      var ov = document.getElementById('grpEditOverlay');
      if (ov) ov.classList.add('show');
    }
    window._editGroup = editGroup;

    /* 刪除群組 */
    function deleteGroup(gid) {
      if (!confirm('確定刪除此群組？')) return;
      loadGroups();
      facGroups = facGroups.filter(function(g){ return g.id !== gid; });
      saveGroups();
      renderGrpBar();
      renderGrpManageList();
    }
    window._deleteGroup = deleteGroup;

    /* 關閉編輯 Modal */
    function closeGrpEdit() {
      var ov = document.getElementById('grpEditOverlay');
      if (ov) ov.classList.remove('show');
      editingGrpId = null;
    }
    window._closeGrpEdit = closeGrpEdit;

    /* 渲染編輯 Modal 的機構清單 */
    function renderGrpFacList() {
      var q = '';
      var srch = document.getElementById('grpFacSearch');
      if (srch) q = srch.value.trim().toLowerCase();
      loadGroups();
      var g = editingGrpId ? facGroups.find(function(x){ return x.id === editingGrpId; }) : null;
      var currentIds = g ? g.facilityIds.map(String) : [];
      var filtered = allFacilities.filter(function(f){
        return !q || (f.name + f.short + f.area).toLowerCase().indexOf(q) >= 0;
      });
      var wrap = document.getElementById('grpFacList');
      if (!wrap) return;
      wrap.innerHTML = filtered.map(function(f){
        var sid = String(f.id);
        var checked = currentIds.indexOf(sid) >= 0;
        return '<label class="grp-fac-item' + (checked ? ' checked' : '') + '">'
          + '<input type="checkbox" value="' + sid + '"' + (checked ? ' checked' : '') + '>'
          + '<span class="grp-fac-item-name">' + f.name
          + (f.area ? '　<span style="color:#94a3b8;font-size:11px;">' + f.area + '</span>' : '')
          + '</span></label>';
      }).join('');
    }
    window._renderGrpFacList = renderGrpFacList;

    /* 儲存群組 */
    function saveGrpEdit() {
      var nameEl = document.getElementById('grpEditName');
      var name = nameEl ? nameEl.value.trim() : '';
      if (!name) { alert('群組名稱不能為空'); return; }
      var checkedIds = Array.from(document.querySelectorAll('#grpFacList input[type=checkbox]:checked')).map(function(el){ return el.value; });
      loadGroups();
      if (editingGrpId) {
        var g = facGroups.find(function(x){ return x.id === editingGrpId; });
        if (g) { g.name = name; g.facilityIds = checkedIds; }
      } else {
        facGroups.push({ id: genId(), name: name, facilityIds: checkedIds });
      }
      saveGroups();
      closeGrpEdit();
      renderGrpBar();
      renderGrpManageList();
    }
    window._saveGrpEdit = saveGrpEdit;

    function toggleFac(safeId) {
      var fac = allFacilities.find(function(f) { return String(f.id).replace(/[^a-zA-Z0-9]/g, '_') === safeId; });
      if (!fac) return;
      var id = fac.id; var sid = String(id);
      if (pendingFacIds.has(id) || pendingFacIds.has(sid)) { pendingFacIds.delete(id); pendingFacIds.delete(sid); }
      else { pendingFacIds.add(id); }
      renderFacList();
    }
    window._toggleFac = toggleFac;

    function selectAllVisible() {
      var inp = document.getElementById('facSearchInput');
      var q = inp ? inp.value.trim().toLowerCase() : '';
      allFacilities.filter(function(f) {
        return !q || f.name.toLowerCase().indexOf(q) >= 0 || f.short.toLowerCase().indexOf(q) >= 0 || f.area.toLowerCase().indexOf(q) >= 0;
      }).forEach(function(f) { pendingFacIds.add(f.id); });
      renderFacList();
    }
    window._selectAllVisible = selectAllVisible;

    function clearAllFac() { pendingFacIds.clear(); renderFacList(); }
    window._clearAllFac = clearAllFac;

    function updateFacCount() {
      var el = document.getElementById('facSelectedCount');
      if (el) el.textContent = '已選 ' + pendingFacIds.size + ' 間';
    }

    function renderFacTags() {
      var count = selectedFacIds.size;
      var badge = document.getElementById('facBadge');
      var label = document.getElementById('facTriggerLabel');
      var tagWrap = document.getElementById('facTagsWrap');
      if (!badge || !label || !tagWrap) return;
      if (count === 0) { badge.style.display = 'none'; label.textContent = '點此選擇機構...'; tagWrap.innerHTML = ''; return; }
      badge.style.display = 'inline-block'; badge.textContent = count;
      label.textContent = '已選擇機構：';
      var sel = allFacilities.filter(function(f) { return selectedFacIds.has(f.id) || selectedFacIds.has(String(f.id)); });
      tagWrap.innerHTML = sel.map(function(f) {
        var safeId = String(f.id).replace(/[^a-zA-Z0-9]/g, '_');
        return '<span class="fac-tag">' + (f.short || f.name)
          + '<button class="fac-tag-del" onclick="removeFac(event,\'' + safeId + '\')" title="移除">×</button></span>';
      }).join('');
    }

    function removeFac(event, safeId) {
      event.stopPropagation();
      var fac = allFacilities.find(function(f) { return String(f.id).replace(/[^a-zA-Z0-9]/g, '_') === safeId; });
      if (fac) { selectedFacIds.delete(fac.id); selectedFacIds.delete(String(fac.id)); }
      renderFacTags();
    }
    window._removeFac = removeFac;

    function getSelectedFacilities() {
      return allFacilities.filter(function(f) { return selectedFacIds.has(f.id) || selectedFacIds.has(String(f.id)); });
    }

    let caseManagers = [];
    async function loadCaseManagers(retries = 5) {
      const client = window.supabaseClient;
      if (!client) {
        if (retries > 0) {
          setTimeout(() => loadCaseManagers(retries - 1), 500);
        }
        return;
      }
      try {
        const { data, error } = await client.from('case_managers').select('*').order('name');
        if (error) { console.error('loadCaseManagers error:', error); return; }
        caseManagers = data || [];
        const sel = document.getElementById("caseManagerSelect");
        if (!sel) return;
        sel.innerHTML = '<option value="">快速帶入名單...</option>' +
          caseManagers.map(m => `<option value="${m.id}">${m.name}（${m.hospital}）</option>`).join('');
      } catch(e) {
        console.error('loadCaseManagers exception:', e);
      }
    }

    function fillManagerInfo() {
      const sel = document.getElementById("caseManagerSelect");
      const m = caseManagers.find(x => x.id === sel.value);
      if (m) {
        document.getElementById("caseManager").value = m.name || "";
        document.getElementById("caseManagerPhone").value = m.phone || "";
        document.getElementById("hospital").value = m.hospital || "";
        document.getElementById("hospitalExt").value = m.ext || "";
        updatePreview();
      }
      sel.value = ""; // 重置選單
    }
  </script>
</body>
</html>
