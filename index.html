<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個案安置轉介平台｜醫療端起案</title>
  <style>
    :root{
      --primary:#0f766e;
      --primary-dark:#115e59;
      --bg:#f0fdfa;
      --card:#ffffff;
      --border:#cbd5e1;
      --text:#0f172a;
      --muted:#475569;
      --danger:#dc2626;
      --success:#16a34a;
      --shadow:0 10px 30px rgba(15, 23, 42, 0.08);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
      background:linear-gradient(180deg,#ecfeff 0%, #f8fafc 100%);
      color:var(--text);
    }

    .wrap{
      max-width:960px;
      margin:0 auto;
      padding:24px 16px 60px;
    }

    .hero{
      background:linear-gradient(135deg,#0f766e 0%, #14b8a6 100%);
      color:#fff;
      border-radius:24px;
      padding:28px 24px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:28px;
      line-height:1.3;
    }

    .hero p{
      margin:0;
      color:rgba(255,255,255,0.92);
      font-size:15px;
      line-height:1.7;
    }

    .card{
      background:var(--card);
      border:1px solid #e2e8f0;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      margin-bottom:18px;
    }

    .section-title{
      font-size:20px;
      font-weight:700;
      margin:0 0 18px;
    }

    .sub-title{
      font-size:15px;
      font-weight:700;
      margin:0 0 14px;
      color:var(--primary-dark);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:16px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:14px;
      font-weight:700;
      color:#1e293b;
    }

    .required{
      color:var(--danger);
      margin-left:4px;
    }

    input[type="text"],
    input[type="number"],
    input[type="datetime-local"],
    select,
    textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:13px 14px;
      font-size:15px;
      outline:none;
      background:#fff;
      transition:all .2s ease;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(20,184,166,0.12);
    }

    .check-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .check-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
    }

    .check-item input{
      width:18px;
      height:18px;
      accent-color:var(--primary);
      flex-shrink:0;
    }

    .helper{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:24px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:all .2s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-dark);
      transform:translateY(-1px);
    }

    .btn-secondary{
      background:#e2e8f0;
      color:#0f172a;
    }

    .btn-secondary:hover{
      background:#cbd5e1;
    }

    .preview-box{
      background:#f8fafc;
      border:1px dashed #94a3b8;
      border-radius:16px;
      padding:16px;
      line-height:1.8;
      font-size:14px;
      color:#334155;
      white-space:pre-wrap;
      min-height:180px;
    }

    .status{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:14px;
      display:none;
      line-height:1.7;
    }

    .status.success{
      display:block;
      background:#f0fdf4;
      border:1px solid #bbf7d0;
      color:#166534;
    }

    .status.error{
      display:block;
      background:#fef2f2;
      border:1px solid #fecaca;
      color:#991b1b;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#ccfbf1;
      color:#115e59;
      margin-bottom:10px;
    }

    @media (max-width: 768px){
      .grid,
      .grid-3,
      .check-grid{
        grid-template-columns:1fr;
      }

      .hero h1{
        font-size:24px;
      }

      .wrap{
        padding:16px 12px 40px;
      }

      .card{
        padding:18px;
      }
    }
    .modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  z-index:999;
}

.modal-content{
  background:#fff;
  width:95%;
  max-width:900px;
  margin:40px auto;
  border-radius:18px;
  padding:20px;
  max-height:80vh;
  overflow:auto;
}

.service-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #eee;
}

.counter{
  display:none;
}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
<div class="wrap">

  <!-- =========================
       HERO
  ========================= -->
  <div class="hero">
    <div class="pill">醫療端起案</div>
    <h1>個案安置轉介平台</h1>
    <p>
      此頁提供醫療端建立安置轉介案件。送出後可串接 n8n / LINE Bot / 資料庫，
      自動通知安置中心群組或各機構。
    </p>
  </div>
<!-- =========================
     立案基本資料（卡片1）
========================= -->
<div class="card">
  <div class="section-title">立案基本資料</div>
  <div class="grid">

    <!-- 第一列 -->
    <div class="field">
      <label>案件編號</label>
      <input type="text" id="caseId" readonly />
    </div>

    <div class="field">
      <label>起案時間</label>
      <input type="datetime-local" id="referralTime" />
    </div>

    <!-- 第二列 -->
    <div class="field">
      <label>個管師姓名<span class="required">*</span></label>
      <div style="display:flex;gap:8px;">
        <input type="text" id="caseManager" style="flex:1;" />
        <button type="button" class="btn-secondary" onclick="fillMyInfo()">帶入登入者資訊</button>
      </div>
    </div>

    <div class="field">
      <label>聯絡電話<span class="required">*</span></label>
      <input type="text" id="caseManagerPhone" />
    </div>

    <!-- 第三列 -->
    <div class="field">
      <label>轉介單位<span class="required">*</span></label>
      <input type="text" id="hospital" />
    </div>

    <div class="field">
      <label>單位分機</label>
      <input type="text" id="hospitalExt" />
    </div>

  </div>
</div>

<!-- =========================
     個案基本資料 + 功能評估（卡片2）
========================= -->
<div class="card">
  <div class="section-title">個案基本資料與功能評估</div>

  <!-- 個案基本資訊 -->
  <div class="sub-title">個案基本資訊</div>
  <div class="grid">

    <div class="field">
      <label>個案姓名</label>
      <input type="text" id="patientName" />
    </div>

    <div class="field">
      <label>性別<span class="required">*</span></label>
      <select id="gender">
        <option value="">請選擇</option>
        <option value="男">男</option>
        <option value="女">女</option>
        <option value="其他">其他</option>
      </select>
    </div>

    <div class="field">
      <label>年齡<span class="required">*</span></label>
      <input type="number" id="age" />
    </div>

    <div class="field">
      <label>身高(cm)</label>
      <input type="number" id="height" />
    </div>

    <div class="field">
      <label>體重(kg)</label>
      <input type="number" id="weight" />
    </div>

    <div class="field full">
      <label>地址</label>
      <input type="text" id="address" />
    </div>

  </div>

  <!-- 功能評估 -->
  <div class="sub-title">功能評估</div>
  <div class="grid-3">

    <div class="field">
      <label>CMS 失能等級</label>
      <select id="cmsLevel">
        <option value="">請選擇</option>
        <option value="2">2級</option>
        <option value="3">3級</option>
        <option value="4">4級</option>
        <option value="5">5級</option>
        <option value="6">6級</option>
        <option value="7">7級</option>
        <option value="8">8級</option>
      </select>
    </div>

    <div class="field">
      <label>行動能力</label>
      <select id="mobility">
        <option value="">請選擇</option>
        <option value="可自行行走">可自行行走</option>
        <option value="可使用輔具行走(手杖、助行器等)">可使用輔具行走(手杖、助行器等)</option>
        <option value="使用輔具並扶持下行走">使用輔具並扶持下行走</option>
        <option value="無法行走，但可站立">無法行走，但可站立</option>
        <option value="無法行走及站立，需全移位">無法行走及站立，需全移位</option>
        <option value="長期臥床，均於床上照顧">長期臥床，均於床上照顧</option>
      </select>
    </div>

    <div class="field">
      <label>意識</label>
      <select id="consciousness">
        <option value="">請選擇</option>
        <option value="清楚">清楚</option>
        <option value="混亂">混亂</option>
        <option value="木僵">木僵</option>
      </select>
    </div>

  </div>
</div>
  
  <!-- =========================
       長照轉介資訊（獨立一張卡）
  ========================= -->
 
<div class="card">
  <div class="section-title">服務項目與照護內容</div>

  <!-- =========================
       ③ 服務需求
  ========================= -->
  <div class="sub-title">服務需求</div>
  <div class="grid">

    <div class="field">
      <label>服務類型</label>
      <select id="serviceType">
        <option value="">請選擇</option>
        <option value="居家服務">居家服務</option>
        <option value="居家喘息服務">居家喘息服務</option>
      </select>
    </div>

    <div class="field">
      <label>服務時段</label>
      <input type="text" id="serviceTime" />
    </div>

  </div>
<div class="sub-title">服務碼別</div>

<div class="field">
  <button type="button" class="btn-secondary" onclick="openServiceModal()">
    選擇服務碼（含次數）
  </button>

  <div id="selectedServices" class="helper">
    尚未選擇
  </div>
</div>

  <div class="field">
    <label>案況簡述（長照）</label>
    <textarea id="caseSummary"></textarea>
  </div>

  <div class="field">
    <label>特殊需求（長照）</label>
    <div class="check-grid" style="margin-top:8px;">
      <label class="check-item"><input type="checkbox" class="special-need-check" value="需女性居服員"> 需女性居服員</label>
      <label class="check-item"><input type="checkbox" class="special-need-check" value="需男性居服員"> 需男性居服員</label>
    </div>
    <input type="text" id="specialNeedOther" placeholder="其他需求..." style="margin-top:10px;">
  </div>



  </div>



</div>
  <!-- =========================
       通知預覽
  ========================= -->
  <div class="card">
    <div class="section-title">LINE 通知預覽</div>

    <div class="field" style="margin-bottom:16px; border:1px solid #bfdbfe; background:#eff6ff; padding:16px; border-radius:14px;">
      <label style="color:#1d4ed8; display:block; margin-bottom:10px;">📋 功能需求：送出案件前，請選擇要送出的機構群組</label>
      <div class="check-grid">
        <label class="check-item"><input type="radio" name="targetGroup" value="指定機構" checked> 指定機構</label>
        <label class="check-item"><input type="radio" name="targetGroup" value="合作機構(一輪)"> 合作機構(一輪)</label>
        <label class="check-item"><input type="radio" name="targetGroup" value="全區機構(二輪)"> 全區機構(二輪)</label>
        <label class="check-item"><input type="radio" name="targetGroup" value="困難派案(三輪)"> 困難派案(三輪)</label>
      </div>
    </div>

    <div id="messagePreview" class="preview-box"></div>

    <div class="toolbar">
      <button class="btn-secondary" id="btnPreview">更新預覽</button>
      <button class="btn-primary" id="btnSubmit">送出案件</button>
      <button class="btn-secondary" id="btnReset">清空</button>
    </div>

    <div id="statusBox" class="status"></div>
  </div>

</div>

  <div id="serviceModal" class="modal">
  <div class="modal-content">

    <div style="display:flex;justify-content:space-between;">
      <h3>選擇服務碼</h3>
      <span onclick="closeServiceModal()" style="cursor:pointer;">✕</span>
    </div>

    <div id="serviceList"></div>

    <div class="toolbar">
      <button class="btn-secondary" onclick="closeServiceModal()">取消</button>
      <button class="btn-primary" onclick="confirmService()">確認</button>
    </div>

  </div>
</div>
  <script>
function getSpecialCareList() {
  return Array.from(document.querySelectorAll(".special-care:checked")).map(item => item.value);
}

    /* =========================
   🔥 新增：服務碼 Modal 系統
========================= */
const services = [
  { category: "🔹 1. 生活照護（ADL）", items: [
    { code: "BA01", name: "基本身體清潔" },
    { code: "BA02", name: "基本日常照顧" },
    { code: "BA04", name: "餵食/灌食" },
    { code: "BA05", name: "餐食照顧" },
    { code: "BA07", name: "沐浴洗頭" },
    { code: "BA23", name: "協助洗頭" },
    { code: "BA24", name: "協助排泄" },
    { code: "BA10", name: "翻身拍背" },
    { code: "BA11", name: "關節活動" }
  ]},
  { category: "🔹 2. 支持性服務（整合 2 + 3 + 5）", items: [
    { code: "BA12", name: "上下樓" },
    { code: "BA13", name: "陪同外出" },
    { code: "BA14", name: "陪同就醫" },
    { code: "BA15-1", name: "家務（自用）" },
    { code: "BA15-2", name: "家務（共用）" },
    { code: "BA16", name: "代購/代送" },
    { code: "BA18", name: "安全看視" },
    { code: "BA20", name: "陪伴服務" },
    { code: "BA22", name: "巡視服務" }
  ]},
  { category: "🔹 3. 醫療與專業照護", items: [
    { code: "BA03", name: "生命徵象" },
    { code: "BA17a", name: "氣道抽吸" },
    { code: "BA17b", name: "口鼻抽吸" },
    { code: "BA17c", name: "管路清潔" },
    { code: "BA17d", name: "血糖/通便" },
    { code: "BA17e", name: "藥盒管理" },
    { code: "BA08", name: "足部照護" },
    { code: "BA09", name: "沐浴車" }
  ]}
];

let serviceCount = {};

function openServiceModal(){
  const list = document.getElementById("serviceList");
  list.innerHTML = "";

  services.forEach(cat => {
    list.innerHTML += `<div class="category-header" style="margin-top:15px; font-weight:bold; color:#1d4ed8; background:#f0f7ff; padding:8px 12px; border-radius:8px; grid-column: 1 / -1;">${cat.category}</div>`;
    
    // 使用 grid 容器包裹項目
    list.innerHTML += `<div class="service-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; padding: 10px 0;">`;
    
    cat.items.forEach(s => {
      const rowHtml = `
        <div class="service-row" onclick="toggleService('${s.code}')" style="cursor:pointer; padding:8px 12px; border:1px solid #f1f5f9; border-radius:8px; display:flex; align-items:center; gap:10px; background:#fff;">
          <input type="checkbox" id="check-${s.code}" ${serviceCount[s.code] ? 'checked' : ''} style="width:16px;height:16px;" onclick="event.stopPropagation(); toggleService('${s.code}')">
          <span style="font-size:14px;">${s.code} ${s.name}</span>
        </div>
      `;
      list.lastElementChild.innerHTML += rowHtml;
    });
    
    list.innerHTML += `</div>`;
  });

  document.getElementById("serviceModal").style.display = "block";
}

function closeServiceModal(){
  document.getElementById("serviceModal").style.display = "none";
}

function toggleService(code){
  if (serviceCount[code]) {
    delete serviceCount[code];
    document.getElementById(`check-${code}`).checked = false;
  } else {
    serviceCount[code] = 1;
    document.getElementById(`check-${code}`).checked = true;
  }
  updatePreview();
}

function updateCount(code, delta){
  // 保持空函式避免舊程式報錯，或可移除
}

function confirmService(){
  const selected = [];
  services.forEach(cat => {
    cat.items.forEach(s => {
      if (serviceCount[s.code]) {
        selected.push(`${s.code} ${s.name}`);
      }
    });
  });

  document.getElementById("selectedServices").textContent =
    selected.length ? selected.join("、") : "尚未選擇";

  closeServiceModal();
  updatePreview();
}

const CREATE_CASE_WEBHOOK_URL = "https://your-n8n-url/webhook/create-referral";
const $ = (id) => document.getElementById(id);

function getTaiwanDateTimeLocal() {
  const now = new Date();
  const taiwanTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
  return taiwanTime.toISOString().slice(0, 16);
}

function generateCaseId() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const rand = Math.random().toString(36).substring(2, 6).toUpperCase();
  return `REF-${y}${m}${d}-${rand}`;
}

function initForm() {
  $("caseId").value = generateCaseId();
  $("referralTime").value = getTaiwanDateTimeLocal();
  updatePreview();
}

function getFormData() {
  return {
    hospital_ext: $("hospitalExt").value,
    case_id: $("caseId").value.trim(),
    referral_time: $("referralTime").value,
    hospital: $("hospital").value.trim(),
    case_manager: $("caseManager").value.trim(),
    case_manager_phone: $("caseManagerPhone").value.trim(),
    patient_name: $("patientName").value,
    gender: $("gender").value,
    age: $("age").value,
    cms_level: $("cmsLevel").value,
    mobility: $("mobility").value,
    consciousness: $("consciousness").value,
    height: $("height").value,
    weight: $("weight").value,
    address: $("address").value,
    service_time: $("serviceTime").value,
    service_codes: Object.keys(serviceCount),
    case_summary: $("caseSummary").value,
    special_needs: Array.from(document.querySelectorAll('.special-need-check:checked')).map(el => el.value),
    special_need_other: $("specialNeedOther").value,
    target_group: document.querySelector('input[name="targetGroup"]:checked')?.value || "未指定",
    status: "待媒合"
  };
}

function validateForm(data) {
  if (!data.hospital) return "請填寫轉介單位";
  if (!data.case_manager) return "請填寫個管師姓名";
  if (!data.case_manager_phone) return "請填寫聯絡電話";
  if (!data.gender) return "請選擇性別";
  if (!data.age) return "請填寫年齡";
  return "";
}

function buildLineMessage(data) {
  const specialStr = [...data.special_needs, data.special_need_other].filter(x => x).join('、');
  
  return `
■個案資訊：
${data.patient_name || "未填姓名"} / ${data.gender} / ${data.age}歲
身高：${data.height || "-"}cm / 體重：${data.weight || "-"}kg
居住地址：${data.address || "-"}
CMS 等級：${data.cms_level || "-"} 級
意識：${data.consciousness || "-"}
行動能力：${data.mobility || "-"}

■服務需求：
服務時段：${data.service_time || "-"}
服務碼別：${
  data.service_codes.length
    ? data.service_codes.map(code => {
        let foundName = "";
        services.forEach(cat => {
          const item = cat.items.find(x => x.code === code);
          if (item) foundName = item.name;
        });
        return `${code} ${foundName}`;
      }).join("、")
    : "-"
}

■案況簡述：
${data.case_summary || "-"}

■特殊需求：
${specialStr || "-"}

■轉介單位：
${data.hospital || "-"}
${data.case_manager || "-"} / ${data.case_manager_phone || "-"} (分機 ${data.hospital_ext || "-"})

👉 請點選連結回覆是否可收案：
https://your-domain/facility.html?case_id=${data.case_id}
`;
}

    function updatePreview() {
      const data = getFormData();
      $("messagePreview").textContent = buildLineMessage(data);
    }

    /* =========================
       狀態顯示
    ========================= */
    function showStatus(type, message) {
      const box = $("statusBox");
      box.className = `status ${type}`;
      box.textContent = message;
    }

    /* =========================
       送出案件
    ========================= */
    async function submitForm() {
      const data = getFormData();
      const error = validateForm(data);

      if (error) {
        showStatus("error", error);
        return;
      }

      // 映射到 Supabase 資料表欄位
      const caseData = {
        case_id: data.case_id,
        patient_name: data.patient_name,
        hospital: data.hospital,
        age: parseInt(data.age) || 0,
        gender: data.gender,
        diagnosis: data.case_summary, // 暫時對應到診斷
        case_summary: data.case_summary,
        mobility: data.mobility,
        consciousness: data.consciousness,
        oxygen: "無", // 預設
        status: "一輪媒合中",
        created_at: new Date().toISOString(),
        contact_name: data.patient_name, // 簡化處理
        contact_phone: data.case_manager_phone,
        address: data.address,
        cms_level: data.cms_level,
        service_type: "長照服務",
        service_time: data.service_time,
        service_codes: data.service_codes,
        special_need: data.special_needs.join('、') + (data.special_need_other ? ` (${data.special_need_other})` : ""),
        case_manager: data.case_manager,
        total_targets: 35
      };

      try {
        showStatus("success", "儲存至資料庫中...");

        const { error: sbError } = await window.supabaseClient
          .from('cases')
          .insert([caseData]);

        if (sbError) throw sbError;

        showStatus(
          "success",
          `案件已成功建立！\n案件編號：${data.case_id}\n資料已存入 Supabase 並自動啟動媒合程序。`
        );

        // 串接 n8n 通知 (可選)
        if (typeof CREATE_CASE_WEBHOOK_URL !== 'undefined' && CREATE_CASE_WEBHOOK_URL.includes("http")) {
          fetch(CREATE_CASE_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(caseData)
          }).catch(e => console.warn("n8n notify error:", e));
        }

        setTimeout(() => {
          if (confirm("建立成功！是否重新整理頁面？")) location.reload();
        }, 1500);

      } catch (err) {
        console.error("Supabase Error:", err);
        showStatus(
          "error",
          `儲存至 Supabase 失敗。\n請確認 SQL Table 已建立且 RLS 已開啟。\n錯誤：${err.message}`
        );
      }
    }

    /* =========================
       清空表單
    ========================= */
    function resetForm() {
      document.querySelectorAll("input[type='text'], input[type='number'], textarea").forEach(el => {
        if (el.id !== "caseId") el.value = "";
      });

      document.querySelectorAll("select").forEach(el => el.value = "");
      
      $("referralTime").value = getTaiwanDateTimeLocal();
      $("caseId").value = generateCaseId();
      updatePreview();
      $("statusBox").className = "status";
      $("statusBox").textContent = "";

      serviceCount = {};
      document.getElementById("selectedServices").textContent = "尚未選擇";
    }

    /* =========================
       事件綁定
    ========================= */
    document.querySelectorAll("input, select, textarea").forEach(el => {
      el.addEventListener("input", updatePreview);
      el.addEventListener("change", updatePreview);
    });

    $("btnPreview").addEventListener("click", updatePreview);
    $("btnSubmit").addEventListener("click", submitForm);
    $("btnReset").addEventListener("click", resetForm);

    initForm();

    function fillMyInfo() {
  // 移除虛擬資料，未來將對接實際登入系統
  document.getElementById("caseManager").value = "";
  document.getElementById("caseManagerPhone").value = "";
  document.getElementById("hospital").value = "";
  document.getElementById("hospitalExt").value = "";

  updatePreview();
}
  </script>
