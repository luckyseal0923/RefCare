<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個案轉介後臺管理系統｜Preview</title>
  <style>
    :root{
      --primary:#7c3aed;
      --primary-dark:#6d28d9;
      --card:#ffffff;
      --border:#e9d5ff;
      --text:#1f2937;
      --muted:#6b7280;
      --shadow:0 10px 30px rgba(15,23,42,0.08);
      --pending-bg:#eff6ff;
      --pending-tx:#1d4ed8;
      --pending-bd:#bfdbfe;
      --pending-bar:#3b82f6;
      --match-bg:#fff7ed;
      --match-tx:#c2410c;
      --match-bd:#fdba74;
      --match-bar:#f97316;
      --done-bg:#f5f3ff;
      --done-tx:#7c3aed;
      --done-bd:#c4b5fd;
      --done-bar:#8b5cf6;
      --closed-bg:#f3f4f6;
      --closed-tx:#374151;
      --closed-bd:#d1d5db;
      --closed-bar:#9ca3af;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
      background:linear-gradient(180deg,#faf5ff 0%, #f8fafc 100%);
      color:var(--text);
    }

    .wrap{ max-width:1680px; margin:0 auto; padding:24px 24px 50px; }
    .hero{
      background:linear-gradient(135deg,#7c3aed 0%, #a78bfa 100%);
      color:#fff;
      border-radius:24px;
      padding:28px 24px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
    }
    .hero-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; }
    .hero h1{ margin:0 0 8px; font-size:30px; }
    .hero p{ margin:0; color:rgba(255,255,255,0.92); line-height:1.7; font-size:15px; max-width:780px; }
    .hero-badge{ display:inline-flex; align-items:center; gap:8px; padding:10px 14px; border-radius:999px; background:rgba(255,255,255,0.18); font-size:13px; font-weight:800; white-space:nowrap; }

    .kpi-grid{ display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin:18px 0; }
    .kpi-card{ background:var(--card); border:1px solid var(--border); border-radius:20px; padding:18px; box-shadow:var(--shadow); }
    .kpi-label{ font-size:13px; color:var(--muted); margin-bottom:10px; font-weight:700; }
    .kpi-value{ font-size:30px; font-weight:900; color:#111827; line-height:1; margin-bottom:8px; }
    .kpi-sub{ font-size:13px; color:var(--muted); line-height:1.6; }

    .panel{ background:var(--card); border:1px solid var(--border); border-radius:22px; box-shadow:var(--shadow); padding:18px; margin-bottom:18px; }
    .panel-title{ font-size:18px; font-weight:900; margin:0 0 14px; color:#111827; }

    .toolbar{ display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto auto; gap:12px; align-items:end; }
    .field,.edit-field{ display:flex; flex-direction:column; gap:8px; }
    .field label,.edit-field label{ font-size:13px; font-weight:800; color:#374151; }
    .toolbar input,.toolbar select,.edit-field input,.edit-field select,.edit-field textarea{
      width:100%; border:1px solid #d8b4fe; border-radius:14px; padding:12px 14px; font-size:14px; background:#fff; outline:none;
    }
    .edit-field textarea{ min-height:92px; resize:vertical; }
    .toolbar input:focus,.toolbar select:focus,.edit-field input:focus,.edit-field select:focus,.edit-field textarea:focus{
      border-color:var(--primary); box-shadow:0 0 0 4px rgba(124,58,237,0.10);
    }

    .btn{ border:none; border-radius:14px; padding:12px 16px; font-size:14px; font-weight:800; cursor:pointer; transition:all .2s ease; height:46px; white-space:nowrap; }
    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-primary:hover{ background:var(--primary-dark); }
    .btn-secondary{ background:#f3f4f6; color:#111827; border:1px solid #e5e7eb; }
    .btn-secondary:hover{ background:#e5e7eb; }

    .table-wrap{ overflow:auto; border:1px solid #ede9fe; border-radius:18px; }
    table{ width:100%; border-collapse:collapse; min-width:1360px; background:#fff; }
    thead th{ text-align:left; font-size:13px; font-weight:900; color:#374151; background:#faf5ff; padding:14px 12px; border-bottom:1px solid #e9d5ff; white-space:nowrap; }
    tbody td{ padding:14px 12px; border-bottom:1px solid #f1f5f9; font-size:14px; color:#374151; vertical-align:top; }
    tbody tr:hover{ background:#fcfcff; }

    .created-at{ font-size:15px; font-weight:800; color:#111827; white-space:nowrap; margin-bottom:8px; }
    .case-id{ font-size:13px; font-weight:400; color:#111827; margin-bottom:4px; }
    .patient-name{ font-size:16px; font-weight:900; color:#111827; line-height:1.3; margin-bottom:4px; letter-spacing:0.2px; }
    .sub-text{ font-size:12px; color:var(--muted); line-height:1.6; }

    .badge{ display:inline-flex; align-items:center; justify-content:center; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:900; white-space:nowrap; border:1px solid transparent; }
    .badge.pending{ background:var(--pending-bg); color:var(--pending-tx); border-color:var(--pending-bd); }
    .badge.matching{ background:var(--match-bg); color:var(--match-tx); border-color:var(--match-bd); }
    .badge.done{ background:var(--done-bg); color:var(--done-tx); border-color:var(--done-bd); }
    .badge.closed{ background:var(--closed-bg); color:var(--closed-tx); border-color:var(--closed-bd); }

    .progress-wrap{ min-width:180px; }
    .progress-top{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; font-size:12px; color:#475569; font-weight:800; }
    .progress-bar{ width:100%; height:10px; border-radius:999px; background:#e5e7eb; overflow:hidden; }
    .progress-fill{ height:100%; border-radius:999px; background:var(--progress-color, #7c3aed); }
    .progress-fill.pending{ --progress-color: var(--pending-bar); }
    .progress-fill.matching{ --progress-color: var(--match-bar); }
    .progress-fill.done{ --progress-color: var(--done-bar); }
    .progress-fill.closed{ --progress-color: var(--closed-bar); }
    .progress-note{ margin-top:8px; font-size:12px; color:#64748b; line-height:1.5; }

    .action-row{ display:flex; flex-wrap:wrap; gap:8px; }
    .action-btn{ border:none; background:#f5f3ff; color:#6d28d9; border-radius:12px; padding:8px 10px; font-size:12px; font-weight:800; cursor:pointer; }
    .action-btn:hover{ background:#ede9fe; }

    .empty{ color:#94a3b8; font-size:14px; padding:28px; text-align:center; border:1px dashed #cbd5e1; border-radius:16px; background:#f8fafc; }

    .drawer-overlay{ position:fixed; inset:0; background:rgba(15,23,42,0.36); opacity:0; pointer-events:none; transition:opacity .22s ease; z-index:40; }
    .drawer-overlay.show{ opacity:1; pointer-events:auto; }
    .detail-drawer{ position:fixed; top:0; right:0; width:min(780px, 94vw); height:100vh; background:#ffffff; box-shadow:-12px 0 30px rgba(15,23,42,0.16); transform:translateX(100%); transition:transform .24s ease; z-index:50; display:flex; flex-direction:column; }
    .detail-drawer.show{ transform:translateX(0); }
    .drawer-header{ padding:20px 22px 16px; border-bottom:1px solid #ede9fe; background:linear-gradient(180deg,#faf5ff 0%, #ffffff 100%); }
    .drawer-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
    .drawer-title{ margin:0 0 8px; font-size:22px; font-weight:900; color:#111827; }
    .drawer-sub{ font-size:13px; color:#6b7280; line-height:1.7; }
    .drawer-close{ border:none; background:#f3f4f6; color:#111827; width:38px; height:38px; border-radius:12px; font-size:18px; font-weight:900; cursor:pointer; flex-shrink:0; }
    .drawer-body{ padding:18px 22px 28px; overflow:auto; flex:1; }
    .drawer-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }

    .detail-grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .detail-card{ background:#fff; border:1px solid #ede9fe; border-radius:16px; padding:14px; }
    .detail-card.full{ grid-column:1 / -1; }
    .detail-card h4{ margin:0 0 10px; font-size:14px; font-weight:900; color:#111827; }
    .detail-card p,.detail-card div{ font-size:13px; color:#475569; line-height:1.8; word-break:break-word; }

    .round-summary-bar{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .round-summary-chip{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:#f8fafc; border:1px solid #e2e8f0; font-size:12px; font-weight:800; color:#334155; }
    .round-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .round-tab{ border:1px solid #d8b4fe; background:#fff; color:#6d28d9; border-radius:12px; padding:8px 12px; font-size:12px; font-weight:800; cursor:pointer; }
    .round-tab.active{ background:#f5f3ff; border-color:#c4b5fd; }

    .facility-table-wrap{ border:1px solid #e5e7eb; border-radius:14px; overflow:auto; background:#fff; }
    .facility-table{ width:100%; min-width:620px; border-collapse:collapse; }
    .facility-table th{ background:#f8fafc; color:#374151; font-size:12px; font-weight:900; text-align:left; padding:10px 12px; border-bottom:1px solid #e5e7eb; white-space:nowrap; }
    .facility-table td{ font-size:12px; color:#475569; padding:10px 12px; border-bottom:1px solid #f1f5f9; vertical-align:top; }
    .facility-table tr:last-child td{ border-bottom:none; }
    .reply-status-tag{ display:inline-flex; align-items:center; justify-content:center; min-width:68px; border-radius:999px; padding:4px 8px; font-size:11px; font-weight:900; border:1px solid transparent; }
    .reply-status-tag.accept{ background:#ecfdf5; color:#166534; border-color:#bbf7d0; }
    .reply-status-tag.reject{ background:#fef2f2; color:#991b1b; border-color:#fecaca; }
    .reply-status-tag.pending{ background:#f3f4f6; color:#374151; border-color:#d1d5db; }

    .reply-tabs .tab-btn {
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reply-tabs .tab-btn:hover { background: #f1f5f9; }
    .reply-tabs .tab-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    .edit-form{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .edit-field.full{ grid-column:1 / -1; }

    @media (max-width: 1200px){ .toolbar{ grid-template-columns:1fr 1fr 1fr; } }
    @media (max-width: 900px){ .kpi-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); } .toolbar{ grid-template-columns:1fr 1fr; } .detail-grid{ grid-template-columns:1fr; } .edit-form{ grid-template-columns:1fr; } }
    @media (max-width: 640px){ .kpi-grid,.toolbar{ grid-template-columns:1fr; } .wrap{ padding:16px 12px 40px; } .hero h1{ font-size:24px; } }

    /* Manager Modal */
    .mgr-overlay { position:fixed; inset:0; background:rgba(15,23,42,0.5); z-index:200; display:none; align-items:center; justify-content:center; }
    .mgr-overlay.show { display:flex; }
    .mgr-modal { background:#fff; border-radius:20px; width:min(750px,92vw); max-height:85vh; display:flex; flex-direction:column; box-shadow:0 24px 60px rgba(0,0,0,0.18); }
    .mgr-modal-head { padding:20px 24px 16px; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center; }
    .mgr-modal-head h2 { margin:0; font-size:18px; font-weight:900; color:#111827; }
    .mgr-modal-body { padding:20px 24px; overflow-y:auto; flex:1; }
    .mgr-modal-close { border:none; background:#f3f4f6; border-radius:10px; width:34px; height:34px; font-size:18px; cursor:pointer; font-weight:900; }
    .mgr-form { display:grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap:10px; align-items:end; background:#f8fafc; padding:14px; border-radius:12px; margin-bottom:18px; }
    @media(max-width:600px){ .mgr-form{ grid-template-columns:1fr 1fr; } }
  </style>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-top">
        <div>
          <h1>個案轉介後臺管理系統</h1>
          <p>單檔預覽版。用來在這裡快速預覽與修改，確認後再同步回 GitHub 正式拆檔版。</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
          <button type="button" onclick="openManagerModal()" style="background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.4); border-radius:10px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; backdrop-filter:blur(4px); transition:all 0.2s;">👤 個管師名單</button>
          <div class="hero-badge">Admin Preview</div>
        </div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">累計案件數</div><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-sub">目前清單中的全部案件</div></div>
      <div class="kpi-card"><div class="kpi-label">一輪媒合中</div><div class="kpi-value" id="kpiPending">0</div><div class="kpi-sub">第一輪媒合進行中案件</div></div>
      <div class="kpi-card"><div class="kpi-label">二輪 / 三輪媒合中</div><div class="kpi-value" id="kpiMatching">0</div><div class="kpi-sub">第二輪與第三輪持續媒合案件</div></div>
      <div class="kpi-card"><div class="kpi-label">案件結案</div><div class="kpi-value" id="kpiDone">0</div><div class="kpi-sub">媒合完成或已結束案件</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">篩選與搜尋</div>
      <div class="toolbar">
        <div class="field"><label for="searchInput">關鍵字搜尋</label><input type="text" id="searchInput" placeholder="搜尋案件編號 / 個案姓名 / 診斷 / 單位" /></div>
        <div class="field"><label for="statusFilter">案件狀態</label><select id="statusFilter"><option value="all">全部狀態</option><option value="合作機構(一輪)">合作機構(一輪)</option><option value="一輪媒合中">一輪媒合中</option><option value="二輪媒合中">二輪媒合中</option><option value="三輪媒合中">三輪媒合中</option><option value="指定機構">指定機構</option><option value="案件結案">案件結案</option></select></div>
        <div class="field"><label for="hospitalFilter">轉介單位</label><select id="hospitalFilter"><option value="all">全部單位</option><option value="萬芳醫院急診">萬芳醫院急診</option><option value="萬芳醫院住院">萬芳醫院住院</option><option value="雙和醫院">雙和醫院</option></select></div>
        <div class="field"><label for="sortFilter">排序方式</label><select id="sortFilter"><option value="newest">起案時間：新到舊</option><option value="oldest">起案時間：舊到新</option></select></div>
        <button class="btn btn-primary" id="btnReload" type="button">重新整理</button>
        <button class="btn btn-secondary" id="btnReset" type="button">清空條件</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">案件清單</div>
      <div id="loadedHint" class="sub-text" style="margin-bottom:10px;">目前載入 0 筆虛擬案件</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>起單時間</th><th>姓名</th><th>轉介單位</th><th>個案摘要</th><th>狀態</th><th>回覆進度</th><th>管理操作</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty" style="display:none; margin-top:14px;">目前尚無案件符合搜尋條件。</div>
    </div>
  </div>

  <script>
    // =============================================
    // 🔔 N8N Webhook 設定區（串接 LINE 通知用）
    // 取得 N8N webhook URL 後，填入對應常數即可
    // =============================================
    const N8N_WEBHOOKS = {
      // 案件結案時通知個管師 / LINE 群組
      closeCase:  "https://your-n8n-url/webhook/close-case",
      // 案件狀態被管理員更新時通知
      updateCase: "https://your-n8n-url/webhook/update-case",
    };

    /** 通用 Webhook 發送（靜默失敗，不阻斷主流程） */
    function notifyN8N(url, payload) {
      if (!url || !url.startsWith('http')) return;
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(e => console.warn('[N8N Webhook Error]', e));
    }

    // 從 supabase-config.js 取得 supabaseClient
    const sb = window.supabaseClient;

    const tableBody = document.getElementById("tableBody");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const hospitalFilter = document.getElementById("hospitalFilter");
    const sortFilter = document.getElementById("sortFilter");
    const btnReset = document.getElementById("btnReset");
    
    let allFacilities = [];
    async function loadFacilities() {
      const { data, error } = await sb.from('facilities').select('id, facility_name, short_name, phone, service_area');
      if (!error && data) {
        allFacilities = data.map(f => ({ 
          id: f.id, 
          name: f.facility_name, 
          short: f.short_name,
          phone: f.phone,
          area: f.service_area
        }));
      }
    }

    // NOTE: drawerOverlay, detailDrawer, etc. are AFTER this script in HTML
    // So we access them via getter functions
    const $d = (id) => document.getElementById(id);

    let allCases = [];
    let currentRenderedList = [];
    let currentEditingIndex = null;

    function replyText(reply) { 
      if (reply === "accept") return "可接案";
      if (reply === "reject") return "待協調";
      return "尚未回覆";
    }
    function badgeClass(status) {
      if (status === "一輪媒合中" || status === "合作機構(一輪)") return "pending";
      if (status === "二輪媒合中") return "matching";
      if (status === "三輪媒合中") return "done";
      if (status === "指定機構") return "matching";
      return "closed";
    }
    function parseCreatedAt(value) { 
      if (!value) return 0;
      return new Date(value).getTime(); 
    }
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getReplyProgress(item) {
      const total = item.total_targets || 35;
      const replies = item.replies || [];
      const repliedCount = replies.length;
      const acceptCount = replies.filter(r => r.reply_status === "accept").length;
      const percent = Math.max(0, Math.min(100, Math.round((repliedCount / total) * 100)));
      return { total, replied: repliedCount, acceptCount, percent };
    }

    function createProgressHtml(item) {
      const progress = getReplyProgress(item);
      const badge = badgeClass(item.status);
      return `
        <div class="progress-wrap">
          <div class="progress-top">
            <span>${progress.replied} / ${progress.total} 已回覆</span>
            <span>${progress.percent}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${badge}" style="width:${progress.percent}%;"></div>
          </div>
          <div class="progress-note">可收案 ${progress.acceptCount} 間</div>
        </div>`;
    }

    async function fetchData() {
      try {
        const { data: cases, error: caseError } = await sb
          .from('cases').select('*').order('created_at', { ascending: false });
        if (caseError) throw caseError;

        const { data: replies, error: replyError } = await sb.from('replies').select('*');
        if (replyError) throw replyError;

        allCases = cases.map(c => ({
          ...c,
          replies: replies.filter(r => r.case_id === c.case_id)
        }));

        renderTable();
        updateKPI(allCases);
      } catch (err) {
        console.error("Fetch Error:", err);
      }
    }

    function renderTable() {
      const keyword = (searchInput.value || '').trim().toLowerCase();
      const filterStatus = statusFilter.value;
      const filterHospital = hospitalFilter.value;
      const sortValue = sortFilter.value;

      let filtered = [...allCases].filter(item => {
        const haystack = [item.case_id, item.patient_name, item.hospital, item.diagnosis, item.case_summary].join(' ').toLowerCase();
        return haystack.includes(keyword)
          && (filterStatus === 'all' || item.status === filterStatus)
          && (filterHospital === 'all' || item.hospital === filterHospital);
      });

      filtered.sort((a, b) => {
        const aT = parseCreatedAt(a.created_at), bT = parseCreatedAt(b.created_at);
        return sortValue === 'newest' ? bT - aT : aT - bT;
      });

      currentRenderedList = filtered;
      
      if (!filtered.length) {
        tableBody.innerHTML = '';
        if (emptyState) emptyState.style.display = 'block';
        return;
      }
      if (emptyState) emptyState.style.display = 'none';
      tableBody.innerHTML = filtered.map((item, index) => createTableRows(item, index)).join('');
    }

    function createTableRows(item, index) {
      const dateStr = new Date(item.created_at).toLocaleString('zh-TW', { hour12: false });
      return `
        <tr>
          <td>
            <div class="created-at">${escapeHtml(dateStr)}</div>
            <div class="case-id">${escapeHtml(item.case_id)}</div>

    function updateKPI(list) {
      document.getElementById('kpiTotal').textContent = String(list.length);
      document.getElementById('kpiPending').textContent = String(list.filter(i => i.status === '一輪媒合中' || i.status === '合作機構(一輪)').length);
      document.getElementById('kpiMatching').textContent = String(list.filter(i => i.status === '二輪媒合中' || i.status === '三輪媒合中').length);
      document.getElementById('kpiDone').textContent = String(list.filter(i => i.status === '案件結案').length);

      if (hintEl) hintEl.textContent = `目前載入 ${list.length} 筆真實案件`;

    function createDrawerContent(item) {
      const targetIds = Array.isArray(item.target_facility_ids) ? item.target_facility_ids : [];
      const replies = item.replies || [];
      
      let displayList = [];
      
      // 智慧補完：如果舊案件沒有紀錄名單，但標註為「一輪」，則自動對照一輪名單
      let finalTargetIds = targetIds;
      if (finalTargetIds.length === 0 && (item.target_group === '合作機構(一輪)' || item.status === '一輪媒合中')) {
        finalTargetIds = allFacilities.filter(f => f.is_round_1).map(f => String(f.id));
      }

      if (finalTargetIds.length > 0) {
        displayList = finalTargetIds.map(id => {
          const fac = allFacilities.find(f => String(f.id) === String(id));
          // 強化比對：同時嘗試 ID 與 名稱比對
          const reply = replies.find(r => 
            String(r.facility_id) === String(id) || 
            (fac && r.facility_name === fac.name) ||
            (fac && r.facility_name === fac.short)
          );
          return {
            name: fac ? fac.name : (reply ? reply.facility_name : '未知機構'),
            phone: fac ? fac.phone : (reply ? '未知電話' : ''),
            area: fac ? fac.area : '',
            status: reply ? reply.reply_status : 'pending',
            time: reply ? new Date(reply.created_at).toLocaleString() : '',
            note: reply ? (reply.note || '無補充說明') : '尚未回覆'
          };
        });
      } else {
        displayList = replies.map(r => {
          const fac = allFacilities.find(f => f.name === r.facility_name || f.short === r.facility_name);
          return {
            name: fac ? fac.name : r.facility_name,
            phone: fac ? fac.phone : '未知電話',
            area: fac ? fac.area : '',
            status: r.reply_status,
            time: new Date(r.created_at).toLocaleString(),
            note: r.note || '無補充說明'
          };
        });
      }

      const replyHtml = displayList.length ? displayList.map(r => `
        <div class="reply-item-card" data-status="${r.status}" style="margin-bottom:12px; padding:12px; background:#f8fafc; border-radius:12px; border:1px solid #f1f5f9;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <strong style="font-size:15px; ${r.status === 'pending' ? 'color:#64748b;' : 'color:#0f172a;'}">${escapeHtml(r.name)}</strong>
            <span>
              ${r.status === 'pending' ? '<span style="color:#f59e0b;font-weight:700;">⏳ 待回覆</span>' : ''}
              ${r.status === 'accept' ? '<span style="color:#10b981;font-weight:700;">✅ 可接案</span>' : ''}
              ${r.status === 'reject' ? '<span style="color:#ef4444;font-weight:700;">⚠️ 待協調</span>' : ''}
            </span>
          </div>
          <div style="font-size:13px; color:#64748b; margin-bottom:4px;">
            📞 電話：<a href="tel:${r.phone}" style="color:#2563eb; text-decoration:none; font-weight:600;">${escapeHtml(r.phone || '未提供')}</a>
            ${r.area ? ` ｜ 📍 區域：${escapeHtml(r.area)}` : ''}
          </div>
          ${r.time ? `<div style="font-size:12px; color:#94a3b8; margin-bottom:4px;">🕒 回覆時間：${escapeHtml(r.time)}</div>` : ''}
          <div style="font-size:13px; color:#1e293b; background:#fff; padding:8px; border-radius:8px; border:1px solid #edf2f7; margin-top:6px;">
            ${escapeHtml(r.note)}
          </div>
        </div>`).join('') : '<div>目前尚無機構回覆紀錄。</div>';

      const serviceCodes = Array.isArray(item.service_codes) ? item.service_codes : [];
      const serviceCodesHtml = serviceCodes.length ? serviceCodes.map(code => `• ${escapeHtml(code)}`).join('<br>') : '尚未填寫';

      return `
        <div class="detail-card">
          <h4>基本資料</h4>
          <div><strong>案件標號：</strong>${escapeHtml(item.case_id)}</div>
          <div><strong>起單時間：</strong>${escapeHtml(new Date(item.created_at).toLocaleString())}</div>
          <div><strong>轉介單位：</strong>${escapeHtml(item.hospital)}</div>
          <div><strong>個管人員：</strong>${escapeHtml(item.case_manager || '未設定')}</div>
          <div><strong>病患姓名：</strong>${escapeHtml(item.patient_name)}</div>
          <div><strong>年齡 / 性別：</strong>${escapeHtml(item.age)}歲 / ${escapeHtml(item.gender)}</div>
          <div><strong>聯絡人：</strong>${escapeHtml(item.contact_name || '未填寫')}</div>
          <div><strong>聯絡電話：</strong>${escapeHtml(item.contact_phone || '未填寫')}</div>
          <div><strong>地址：</strong>${escapeHtml(item.address || '未填寫')}</div>
        </div>
        <div class="detail-card">
          <h4>功能評估</h4>
          <div><strong>主要診斷：</strong>${escapeHtml(item.diagnosis)}</div>
          <div><strong>案況簡述：</strong>${escapeHtml(item.case_summary)}</div>
          <div><strong>CMS：</strong>${escapeHtml(item.cms_level || '未填寫')}</div>
          <div><strong>意識狀態：</strong>${escapeHtml(item.consciousness || '未填寫')}</div>
          <div><strong>行動能力：</strong>${escapeHtml(item.mobility)}</div>
          <div><strong>氧氣需求：</strong>${escapeHtml(item.oxygen)}</div>
          <div><strong>特殊需求：</strong>${escapeHtml(item.special_need || '未填寫')}</div>
        </div>
        <div class="detail-card full">
          <h4>服務需求</h4>
          <div><strong>服務類型：</strong>${escapeHtml(item.service_type || '未填寫')}</div>
          <div><strong>服務時段：</strong>${escapeHtml(item.service_time || '未填寫')}</div>
          <div><strong>服務碼別：</strong><br>${serviceCodesHtml}</div>
        </div>
        <div class="detail-card full">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h4 style="margin:0;">機構回覆紀錄</h4>
            <div class="reply-tabs" style="display:flex; gap:5px;">
              <button class="tab-btn active" onclick="filterReplies('all', this)">全部</button>
              <button class="tab-btn" onclick="filterReplies('pending', this)">待回覆</button>
              <button class="tab-btn" onclick="filterReplies('accept', this)">可接案</button>
              <button class="tab-btn" onclick="filterReplies('reject', this)">待協調</button>
            </div>
          </div>
          <div id="repliesContainer">${replyHtml}</div>
        </div>`;
    }

    function filterReplies(status, btn) {
      const container = document.getElementById('repliesContainer');
      const items = container.querySelectorAll('.reply-item-card');
      const buttons = btn.parentElement.querySelectorAll('.tab-btn');
      
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      items.forEach(item => {
        if (status === 'all' || item.dataset.status === status) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    }
    window.filterReplies = filterReplies;

    function createEditForm(item, index) {
      const statusOptions = ['合作機構(一輪)', '一輪媒合中', '二輪媒合中', '三輪媒合中', '指定機構', '案件結案'];
      const statusHtml = statusOptions.map(s => `<option value="${escapeHtml(s)}" ${item.status === s ? 'selected' : ''}>${escapeHtml(s)}</option>`).join('');
      const consciousnessOptions = ['清楚', '混亂', '木僵'];
      const consciousnessHtml = consciousnessOptions.map(c => `<option value="${escapeHtml(c)}" ${item.consciousness === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('');
      const mobilityOptions = ['可自行行走', '可使用輔具行走(手杖、助行器等)', '使用輔具並扶持下行走', '無法行走，但可站立', '無法行走及站立，需全移位', '長期臥床，均於床上照顧'];
      const mobilityHtml = mobilityOptions.map(m => `<option value="${escapeHtml(m)}" ${item.mobility === m ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('');

      return `
        <div class="detail-card full">
          <h4>編輯案件資料</h4>
          <form class="edit-form" id="editCaseForm" data-index="${index}">
            <div class="edit-field"><label>案件標號</label><input name="case_id" value="${escapeHtml(item.case_id)}" readonly /></div>
            <div class="edit-field"><label>病患姓名</label><input name="patient_name" value="${escapeHtml(item.patient_name)}" /></div>
            <div class="edit-field"><label>轉介單位</label><input name="hospital" value="${escapeHtml(item.hospital)}" /></div>
            <div class="edit-field"><label>年齡</label><input name="age" value="${escapeHtml(item.age)}" /></div>
            <div class="edit-field"><label>性別</label><input name="gender" value="${escapeHtml(item.gender)}" /></div>
            <div class="edit-field"><label>案件狀態</label><select name="status">${statusHtml}</select></div>
            <div class="edit-field"><label>個管人員</label><input name="case_manager" value="${escapeHtml(item.case_manager || '')}" /></div>
            <div class="edit-field full"><label>主要診斷</label><textarea name="diagnosis">${escapeHtml(item.diagnosis)}</textarea></div>
            <div class="edit-field full"><label>案況簡述</label><textarea name="case_summary">${escapeHtml(item.case_summary)}</textarea></div>
            <div class="edit-field"><label>CMS</label><input name="cms_level" value="${escapeHtml(item.cms_level || '')}" /></div>
            <div class="edit-field"><label>意識狀態</label><select name="consciousness">${consciousnessHtml}</select></div>
            <div class="edit-field"><label>行動能力</label><select name="mobility">${mobilityHtml}</select></div>
            <div class="edit-field"><label>氧氣需求</label><input name="oxygen" value="${escapeHtml(item.oxygen || '')}" /></div>
            <div class="edit-field"><label>服務時段</label><input name="service_time" value="${escapeHtml(item.service_time || '')}" /></div>
            <div class="edit-field"><label>聯絡人</label><input name="contact_name" value="${escapeHtml(item.contact_name || '')}" /></div>
            <div class="edit-field"><label>聯絡電話</label><input name="contact_phone" value="${escapeHtml(item.contact_phone || '')}" /></div>
            <div class="edit-field full"><label>地址</label><textarea name="address">${escapeHtml(item.address || '')}</textarea></div>
          </form>
          <div class="drawer-actions">
            <button class="btn btn-primary" type="button" id="saveEditBtn">儲存修改</button>
            <button class="btn btn-secondary" type="button" id="cancelEditBtn">取消</button>
          </div>
        </div>`;
    }

    async function saveEditForm() {
      const form = document.getElementById('editCaseForm');
      if (!form || currentEditingIndex === null) return;
      const formData = new FormData(form);
      const caseId = formData.get('case_id');
      const updates = {
        patient_name: formData.get('patient_name'),
        hospital: formData.get('hospital'),
        age: parseInt(formData.get('age')),
        gender: formData.get('gender'),
        status: formData.get('status'),
        case_manager: formData.get('case_manager'),
        diagnosis: formData.get('diagnosis'),
        case_summary: formData.get('case_summary'),
        cms_level: formData.get('cms_level'),
        consciousness: formData.get('consciousness'),
        mobility: formData.get('mobility'),
        oxygen: formData.get('oxygen'),
        service_time: formData.get('service_time'),
        contact_name: formData.get('contact_name'),
        contact_phone: formData.get('contact_phone'),
        address: formData.get('address')
      };
      try {
        const { error } = await sb.from('cases').update(updates).eq('case_id', caseId);
        if (error) throw error;

        // 🔔 N8N：案件更新通知
        notifyN8N(N8N_WEBHOOKS.updateCase, {
          event: 'case_updated',
          case_id: caseId,
          ...updates,
          updated_at: new Date().toISOString()
        });

        alert("修改成功！");
        await fetchData();
        openDrawer(currentEditingIndex);
      } catch (err) {
        alert("修改失敗：" + err.message);
      }
    }

    async function closeCase(caseId) {
      if (!confirm("確定要將此案件結案嗎？")) return;
      try {
        const { error } = await sb.from('cases').update({ status: '案件結案' }).eq('case_id', caseId);
        if (error) throw error;

        // 🔔 N8N：結案通知
        const closedCase = allCases.find(c => c.case_id === caseId);
        notifyN8N(N8N_WEBHOOKS.closeCase, {
          event: 'case_closed',
          case_id: caseId,
          patient_name: closedCase?.patient_name || '',
          hospital: closedCase?.hospital || '',
          case_manager: closedCase?.case_manager || '',
          closed_at: new Date().toISOString()
        });

        await fetchData();
      } catch (err) {
        alert("結案失敗：" + err.message);
      }
    }

    /** 複製安置機構回覆頁面連結 */
    function copyFacilityLink(caseId) {
      const baseUrl = window.location.href.split('?')[0].split('#')[0];
      const facilityUrl = baseUrl.replace('admin.html', 'facility.html') + '?case_id=' + caseId;
      
      navigator.clipboard.writeText(facilityUrl).then(() => {
        alert("已複製連結：\n" + facilityUrl);
      }).catch(err => {
        console.error("Copy failed", err);
        // Fallback for older browsers or non-secure contexts
        const textArea = document.createElement("textarea");
        textArea.value = facilityUrl;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          alert("已複製連結：\n" + facilityUrl);
        } catch (e) {
          alert("複製失敗，請手動複製：" + facilityUrl);
        }
        document.body.removeChild(textArea);
      });
    }

    function openDrawer(index) {
      const item = currentRenderedList[index];
      if (!item) return;
      currentEditingIndex = index;
      const pName = $d('drawerPatientName');
      const pMeta = $d('drawerMeta');
      const pContent = $d('drawerContent');
      const overlay = $d('drawerOverlay');
      const drawer = $d('detailDrawer');
      if (pName) pName.textContent = item.patient_name;
      if (pMeta) pMeta.textContent = `${item.case_id}｜${new Date(item.created_at).toLocaleString()}｜${item.hospital}`;
      if (pContent) pContent.innerHTML = createDrawerContent(item);
      if (overlay) overlay.classList.add('show');
      if (drawer) { drawer.classList.add('show'); drawer.setAttribute('aria-hidden', 'false'); }
      document.body.style.overflow = 'hidden';
    }

    function openEditDrawer(index) {
      const item = currentRenderedList[index];
      if (!item) return;
      currentEditingIndex = index;
      const pName = $d('drawerPatientName');
      const pMeta = $d('drawerMeta');
      const pContent = $d('drawerContent');
      const overlay = $d('drawerOverlay');
      const drawer = $d('detailDrawer');
      if (pName) pName.textContent = `${item.patient_name}｜編輯模式`;
      if (pMeta) pMeta.textContent = `${item.case_id}｜${new Date(item.created_at).toLocaleString()}｜${item.hospital}`;
      if (pContent) pContent.innerHTML = createEditForm(item, index);
      if (overlay) overlay.classList.add('show');
      if (drawer) { drawer.classList.add('show'); drawer.setAttribute('aria-hidden', 'false'); }
      document.body.style.overflow = 'hidden';
      setTimeout(() => {
        const saveBtn = document.getElementById('saveEditBtn');
        const cancelBtn = document.getElementById('cancelEditBtn');
        if (saveBtn) saveBtn.onclick = saveEditForm;
        if (cancelBtn) cancelBtn.onclick = () => openDrawer(index);
      }, 0);
    }

    function closeDrawer() {
      const overlay = $d('drawerOverlay');
      const drawer = $d('detailDrawer');
      if (overlay) overlay.classList.remove('show');
      if (drawer) { drawer.classList.remove('show'); drawer.setAttribute('aria-hidden', 'true'); }
      document.body.style.overflow = '';
    }

    function resetFilters() {
      searchInput.value = '';
      statusFilter.value = 'all';
      hospitalFilter.value = 'all';
      sortFilter.value = 'newest';
      renderTable();
    }

    function setupRealtime() {
      sb.channel('db_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'cases' }, fetchData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'replies' }, fetchData)
        .subscribe();
    }

    // ===== 個管師名單 =====
    let managersList = [];
    async function loadManagers() {
      const { data } = await sb.from('case_managers').select('*').order('name');
      managersList = data || [];
      renderManagers();
    }
    function renderManagers() {
      const container = $d('managerTableBody');
      if (!container) return;
      container.innerHTML = managersList.length
        ? managersList.map(m => `
          <div class="mgr-item">
            <div class="mgr-item-info">
              <div class="mgr-item-name">${escapeHtml(m.name)}</div>
              <div class="mgr-item-sub">${escapeHtml(m.hospital)}${m.ext ? '　分機 ' + escapeHtml(m.ext) : ''}　${escapeHtml(m.phone)}</div>
            </div>
            <button class="mgr-delete-btn" onclick="deleteManager('${m.id}')">刪除</button>
          </div>`).join('')
        : '<div class="mgr-empty">尚無個管師資料，請從上方新增</div>';
    }
    function openManagerModal() {
      const el = $d('mgrOverlay');
      if (el) el.classList.add('show');
      loadManagers();
    }
    function closeMgrModal() {
      const el = $d('mgrOverlay');
      if (el) el.classList.remove('show');
    }
    async function addManager() {
      const name = ($d('addMName').value || '').trim();
      const phone = ($d('addMPhone').value || '').trim();
      const hospital = ($d('addMHospital').value || '').trim();
      const ext = ($d('addMExt').value || '').trim();
      if (!name || !phone || !hospital) return alert("姓名、電話、單位為必填");
      const { error } = await sb.from('case_managers').insert([{ name, phone, hospital, ext }]);
      if (error) { alert("新增失敗：" + error.message); return; }
      $d('addMName').value = '';
      $d('addMPhone').value = '';
      $d('addMHospital').value = '';
      $d('addMExt').value = '';
      loadManagers();
    }
    async function deleteManager(id) {
      if (!confirm("確定刪除此個管師？")) return;
      const { error } = await sb.from('case_managers').delete().eq('id', id);
      if (error) alert("刪除失敗：" + error.message);
      else loadManagers();
    }

    // ===== 事件綁定 & 初始化 =====
    tableBody.addEventListener('click', (event) => {
      const btn = event.target.closest('button[data-action]');
      if (!btn) return;
      const index = Number(btn.dataset.index);
      if (btn.dataset.action === 'detail') openDrawer(index);
      if (btn.dataset.action === 'edit') openEditDrawer(index);
    });

    searchInput.addEventListener('input', renderTable);
    statusFilter.addEventListener('change', renderTable);
    hospitalFilter.addEventListener('change', renderTable);
    sortFilter.addEventListener('change', renderTable);
    btnReload.addEventListener('click', fetchData);
    btnReset.addEventListener('click', resetFilters);

    // Drawer overlay & close button - accessed after DOM is fully parsed
    document.addEventListener('DOMContentLoaded', () => {
      const ov = $d('drawerOverlay');
      const dc = $d('drawerClose');
      if (ov) ov.addEventListener('click', closeDrawer);
      if (dc) dc.addEventListener('click', closeDrawer);
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeDrawer(); closeMgrModal(); } });
    });

    loadFacilities();
    fetchData();
    setupRealtime();
  </script>
